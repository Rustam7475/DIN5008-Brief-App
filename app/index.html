<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DIN 5008 Brief-App — Startseite</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="page-scroll">

<!-- ================= NAVIGATION ================= -->
<nav class="navbar">
    <a href="index.html" class="navbar-brand">
        <span class="navbar-brand-icon">📄</span>
        <span class="navbar-brand-text">DIN 5008 Brief-App</span>
    </a>
    <div class="navbar-nav">
        <a href="index.html" class="nav-link active">
            <span class="nav-link-icon">🏠</span>
            <span data-i18n="nav_start">Start</span>
        </a>
        <a href="letters.html" class="nav-link">
            <span class="nav-link-icon">📂</span>
            <span data-i18n="nav_letters">Meine Briefe</span>
        </a>
        <a href="profil.html" class="nav-link">
            <span class="nav-link-icon">👤</span>
            <span data-i18n="nav_profile">Profil</span>
        </a>
    </div>
    <div class="navbar-actions">
        <a href="#" class="nav-upgrade" id="nav-upgrade-btn" style="display:none" data-i18n="upgrade_to_pro">⭐ Auf PRO upgraden</a>
        <button class="btn-icon btn-hint-lang" title="Подсказки: Русский → English">🇷🇺</button>
        <button id="btn-theme" class="btn-icon" title="Thema wechseln / Сменить тему">🌙</button>
    </div>
</nav>

<!-- ================= MAIN CONTENT ================= -->
<div class="home-container page-enter">

    <!-- Hero -->
    <div class="home-hero">
        <h1 data-i18n="hero_title">Geschäftsbrief erstellen</h1>
        <p data-i18n="hero_subtitle">DIN 5008 — professionelle Briefe, einfach und korrekt</p>
        <span class="app-version-badge">DIN 5008 Brief-App v.3.2.0</span>
    </div>

    <!-- Template Selection -->
    <div class="home-section-title" data-i18n="choose_tpl_title">Briefvorlage wählen</div>

    <!-- Category filter -->
    <div class="category-filter" id="category-filter">
        <button class="filter-pill active" data-cat="all">Alle</button>
    </div>

    <div class="template-grid" id="template-grid">
        <!-- Cards are generated by JS below -->
    </div>

    <!-- Quick Actions -->
    <div class="home-section-title" data-i18n="quick_access">Schnellzugriff</div>

    <div class="home-actions">
        <a href="letters.html" class="home-action-btn">
            <span class="icon">📂</span>
            <span data-i18n="btn_my_letters">Meine Briefe</span>
        </a>
        <a href="profil.html" class="home-action-btn">
            <span class="icon">👤</span>
            <span data-i18n="btn_sender_profile">Absender-Profil</span>
        </a>
        <button class="home-action-btn" id="btn-export-all">
            <span class="icon">💾</span>
            <span data-i18n="btn_export_text">Backup exportieren</span>
        </button>
        <label class="home-action-btn" for="import-file">
            <span class="icon">📥</span>
            <span data-i18n="btn_import_text">Backup importieren</span>
        </label>
        <input type="file" id="import-file" accept=".json" class="sr-only">
    </div>

    <!-- Recent Letters -->
    <div class="recent-letters">
        <div class="home-section-title" data-i18n="recent_title">Zuletzt bearbeitet</div>
        <div id="recent-list"></div>
    </div>

</div>

<script src="license.js"></script>
<script src="shared.js"></script>
<script>
(function() {
    'use strict';

    // Init dark theme
    ThemeManager.init();
    HintLangManager.init();

    // Template card descriptions (DE + RU hint)
    const CARD_DESCS = {
        free:          'Leerer Brief ohne Vorlage — Sie füllen alles selbst aus',
        kuendigung:    'Vertrag, Mitgliedschaft, Versicherung u.a. kündigen',
        mahnung:       'Zahlungserinnerung an säumige Zahler senden',
        widerspruch:   'Bescheide, Rechnungen oder Entscheidungen anfechten',
        bewerbung:     'Anschreiben für Stellenbewerbungen verfassen',
        reklamation:   'Mängel beanstanden und Nachbesserung fordern',
        widerruf:      'Verträge und Online-Bestellungen innerhalb 14 Tagen widerrufen',
        mietminderung: 'Mängel an der Wohnung melden und Miete mindern',
        abmahnung:     'Formale Abmahnung bei Verstößen aussprechen',
        dsgvo:         'Auskunft über gespeicherte Daten nach DSGVO anfordern',
        vollmacht:     'Vollmacht zur Vertretung in Behörden- und Rechtsangelegenheiten',
        schadensersatz:'Schadensersatz bei Unfällen und Sachschäden fordern',
        ratenzahlung:  'Ratenzahlung bei offenen Forderungen vereinbaren',
        mietkaution:   'Mietkaution nach Auszug vom Vermieter zurückfordern'
    };

    const CARD_DESCS_RU = {
        free:          'Пустое письмо — заполните всё самостоятельно',
        kuendigung:    'Расторжение договора, страховки, подписки',
        mahnung:       'Напоминание об оплате неоплаченных счетов',
        widerspruch:   'Возражение против решений и уведомлений',
        bewerbung:     'Сопроводительное письмо к резюме',
        reklamation:   'Жалоба на дефекты и требование замены',
        widerruf:      'Отзыв договора или онлайн-заказа в течение 14 дней',
        mietminderung: 'Уведомление о дефекте квартиры и снижение аренды',
        abmahnung:     'Формальное предупреждение о нарушении',
        dsgvo:         'Запрос персональных данных по GDPR',
        vollmacht:     'Доверенность для представительства в учреждениях',
        schadensersatz:'Требование возмещения ущерба при ДТП, повреждениях',
        ratenzahlung:  'Просьба о рассрочке платежа',
        mietkaution:   'Возврат залога от арендодателя после выезда'
    };

    const CARD_DESCS_EN = {
        free:          'Empty letter — fill in everything yourself',
        kuendigung:    'Cancel contracts, insurance, subscriptions',
        mahnung:       'Payment reminder for unpaid invoices',
        widerspruch:   'Object to decisions and notices',
        bewerbung:     'Cover letter for job applications',
        reklamation:   'Complain about defects and demand repair',
        widerruf:      'Withdraw from contracts and online orders within 14 days',
        mietminderung: 'Report apartment defects and reduce rent',
        abmahnung:     'Issue formal warning for violations',
        dsgvo:         'Request personal data under GDPR',
        vollmacht:     'Power of attorney for legal representation',
        schadensersatz:'Claim compensation for accidents and damages',
        ratenzahlung:  'Request installment payment plan',
        mietkaution:   'Demand return of rental deposit after move-out'
    };

    // Build template cards
    const grid = document.getElementById('template-grid');
    let activeCategory = 'all';

    function renderCategoryFilter() {
        const filterEl = document.getElementById('category-filter');
        const lang = HintLangManager.get();
        let html = '<button class="filter-pill' + (activeCategory === 'all' ? ' active' : '') + '" data-cat="all">' + t('filter_all') + '</button>';
        Object.entries(CATEGORIES).forEach(([key, cat]) => {
            const catName = lang === 'de' ? cat.name : lang === 'ru' ? cat.nameRu : cat.nameEn;
            html += '<button class="filter-pill' + (activeCategory === key ? ' active' : '') + '" data-cat="' + key + '">' + cat.icon + ' ' + catName + '</button>';
        });
        filterEl.innerHTML = html;
        filterEl.querySelectorAll('.filter-pill').forEach(btn => {
            btn.addEventListener('click', () => {
                activeCategory = btn.dataset.cat;
                renderCategoryFilter();
                renderGrid();
            });
        });
    }

    function renderGrid() {
        const lang = HintLangManager.get();
        const isPro = LicenseManager.isPro();
        grid.innerHTML = '';
        Object.entries(CATEGORIES).forEach(([key, cat]) => {
            if (activeCategory !== 'all' && activeCategory !== key) return;
            const locked = !isPro && !LicenseManager.isTemplateFree(key);
            const a = document.createElement('a');
            if (locked) {
                a.href = '#';
                a.className = 'template-card locked';
                a.addEventListener('click', (e) => {
                    e.preventDefault();
                    LicenseManager.showUpgradeModal('template');
                });
            } else {
                a.href = key === 'free' ? 'editor.html' : 'editor.html?template=' + key;
                a.className = 'template-card';
            }
            a.style.setProperty('--card-color', cat.color);
            const catName = lang === 'de' ? cat.name : lang === 'ru' ? cat.nameRu : cat.nameEn;
            const desc = lang === 'de' ? (CARD_DESCS[key] || '') : lang === 'ru' ? (CARD_DESCS_RU[key] || '') : (CARD_DESCS_EN[key] || '');
            a.innerHTML = `
                <span class="template-card-icon">${cat.icon}</span>
                <span class="template-card-name">${catName}</span>
                <span class="template-card-desc">${desc}</span>
                ${locked ? '<span class="template-card-pro-badge">PRO</span>' : ''}
            `;
            grid.appendChild(a);
        });
    }
    renderCategoryFilter();
    renderGrid();

    // Recent letters
    function renderRecent() {
        const list = document.getElementById('recent-list');
        const letters = LettersManager.getAll().slice(0, 6);
        if (!letters.length) {
            list.innerHTML = '<div class="recent-empty">' + t('no_letters_yet') + '</div>';
            return;
        }
        const html = '<div class="recent-grid">' + letters.map(l => {
            const cat = CATEGORIES[l.category] || CATEGORIES.free;
            const meta = [l.recipient, l.subject].filter(Boolean).join(' — ');
            const formLabel = l.form || (l.data && l.data.form) || 'B';
            const formCls = formLabel === 'C4' ? 'form-badge-c4' : formLabel === 'A' ? 'form-badge-a' : 'form-badge-b';
            return `<a href="editor.html?load=${encodeURIComponent(l.id)}" class="recent-card">
                <span class="recent-card-icon">${cat.icon}</span>
                <div class="recent-card-info">
                    <div class="recent-card-name">${escapeHtml(l.name)}</div>
                    <div class="recent-card-meta">${formatDateShort(l.date)}${meta ? ' · ' + escapeHtml(meta) : ''}</div>
                </div>
                <span class="form-badge ${formCls}">${escapeHtml(formLabel)}</span>
            </a>`;
        }).join('') + '</div>';
        list.innerHTML = html;
    }
    renderRecent();

    // Re-apply hint language after dynamic content is built
    HintLangManager.apply();

    // Rebuild dynamic content on language change
    HintLangManager.onApply(() => {
        renderCategoryFilter();
        renderGrid();
        renderRecent();
    });

    // Export/Import
    document.getElementById('btn-export-all').addEventListener('click', () => {
        if (!LicenseManager.canImportExport()) {
            LicenseManager.showUpgradeModal('export');
            return;
        }
        LettersManager.exportAll();
    });

    document.getElementById('import-file').addEventListener('change', async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        if (!LicenseManager.canImportExport()) {
            LicenseManager.showUpgradeModal('import');
            e.target.value = '';
            return;
        }
        try {
            const count = await LettersManager.importAll(file);
            alert(t('imported', { count: count }));
            renderRecent();
        } catch (err) {
            alert(t('import_error') + err.message);
        }
        e.target.value = '';
    });

    // ---- Onboarding Wizard ----
    const OB_KEY = 'din5008_onboarding_done';
    if (!localStorage.getItem(OB_KEY)) {
        showOnboarding();
    }

    function showOnboarding() {
        let lang = HintLangManager.get();

        function getSteps() {
            return [
                {
                    icon: '🌐',
                    title: 'Sprache / Language / Язык',
                    text: '',
                    isLangStep: true
                },
                {
                    icon: '📄',
                    title: lang === 'de' ? 'Willkommen!' : lang === 'ru' ? 'Добро пожаловать!' : 'Welcome!',
                    text: lang === 'de' ? 'DIN 5008 Brief-App erstellt professionelle Geschäftsbriefe nach dem deutschen Standard DIN 5008.'
                        : lang === 'ru' ? 'DIN 5008 Brief-App создаёт профессиональные деловые письма по немецкому стандарту DIN 5008.'
                        : 'DIN 5008 Brief-App creates professional business letters following the German DIN 5008 standard.'
                },
                {
                    icon: '👤',
                    title: lang === 'de' ? 'Profil einrichten' : lang === 'ru' ? 'Настройте профиль' : 'Set up your profile',
                    text: lang === 'de' ? 'Gehen Sie zu Profil und geben Sie Ihre Absenderdaten ein — sie werden automatisch in neue Briefe eingefügt. Sie können Logo und Unterschrift hochladen.'
                        : lang === 'ru' ? 'Перейдите в Профиль и введите данные отправителя — они автоматически попадут в новые письма. Можно загрузить логотип и подпись.'
                        : 'Go to Profile and enter your sender data — it will be automatically filled in new letters. You can upload a logo and signature.'
                },
                {
                    icon: '✉️',
                    title: lang === 'de' ? 'Brief verfassen' : lang === 'ru' ? 'Создайте письмо' : 'Create a letter',
                    text: lang === 'de' ? 'Wählen Sie eine Vorlage, füllen Sie die Felder aus und exportieren Sie als PDF. Shortcuts: ⌘S Speichern, ⌘P Drucken, ⌘E PDF.'
                        : lang === 'ru' ? 'Выберите шаблон, заполните поля и экспортируйте как PDF. Горячие клавиши: ⌘S Сохранить, ⌘P Печать, ⌘E PDF.'
                        : 'Choose a template, fill in the fields and export as PDF. Shortcuts: ⌘S Save, ⌘P Print, ⌘E PDF.'
                }
            ];
        }

        let currentStep = 0;

        const overlay = document.createElement('div');
        overlay.className = 'modal-overlay onboarding-overlay';
        overlay.id = 'onboarding-modal';

        function renderStep() {
            const steps = getSteps();
            const s = steps[currentStep];
            const isLast = currentStep === steps.length - 1;
            const isFirst = currentStep === 0;
            const nextLabel = lang === 'de' ? 'Weiter' : lang === 'ru' ? 'Далее' : 'Next';
            const backLabel = lang === 'de' ? 'Zurück' : lang === 'ru' ? 'Назад' : 'Back';
            const doneLabel = lang === 'de' ? 'Loslegen!' : lang === 'ru' ? 'Начать!' : 'Get started!';

            let bodyHtml = '';
            if (s.isLangStep) {
                bodyHtml = `<div class="onboarding-lang-pick">
                    <button class="ob-lang-btn${lang === 'de' ? ' active' : ''}" data-lang="de"><span class="ob-lang-flag">🇩🇪</span> Deutsch</button>
                    <button class="ob-lang-btn${lang === 'en' ? ' active' : ''}" data-lang="en"><span class="ob-lang-flag">🇬🇧</span> English</button>
                    <button class="ob-lang-btn${lang === 'ru' ? ' active' : ''}" data-lang="ru"><span class="ob-lang-flag">🇷🇺</span> Русский</button>
                </div>`;
            } else {
                bodyHtml = '<p class="onboarding-text">' + s.text + '</p>';
            }

            overlay.innerHTML = `<div class="modal onboarding-modal">
                <div class="onboarding-step">
                    <div class="onboarding-icon">${s.icon}</div>
                    <h2 class="onboarding-title">${s.title}</h2>
                    ${bodyHtml}
                    <div class="onboarding-dots">${steps.map((_, i) =>
                        '<span class="onboarding-dot' + (i === currentStep ? ' active' : '') + '"></span>'
                    ).join('')}</div>
                    <div class="onboarding-actions">
                        ${!isFirst ? '<button class="action-btn btn-secondary" id="ob-back">' + backLabel + '</button>' : ''}
                        <button class="action-btn btn-primary" id="ob-next">${isLast ? doneLabel : nextLabel}</button>
                    </div>
                </div>
            </div>`;

            // Language pick handlers
            overlay.querySelectorAll('.ob-lang-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    lang = btn.dataset.lang;
                    HintLangManager.set(lang);
                    renderStep();
                    // Rebuild main page behind the modal
                    renderCategoryFilter();
                    renderGrid();
                    renderRecent();
                });
            });

            const backBtn = overlay.querySelector('#ob-back');
            if (backBtn) backBtn.addEventListener('click', () => { currentStep--; renderStep(); });
            overlay.querySelector('#ob-next').addEventListener('click', () => {
                if (isLast) {
                    localStorage.setItem(OB_KEY, '1');
                    overlay.remove();
                } else {
                    currentStep++;
                    renderStep();
                }
            });
        }

        renderStep();
        document.body.appendChild(overlay);
    }

    // PRO upgrade button in nav
    const navUpgrade = document.getElementById('nav-upgrade-btn');
    if (navUpgrade) {
        if (!LicenseManager.isPro()) {
            navUpgrade.style.display = '';
            navUpgrade.addEventListener('click', (e) => {
                e.preventDefault();
                LicenseManager.showUpgradeModal();
            });
        }
    }

})();
</script>

</body>
</html>
